<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AL MUKHTAR PETROLEUM | Fuel Tank Dip Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f3f6fb;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
}

.header{
    background:#0d6efd;
    color:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    font-size:28px;
}

.header p{
    margin-top:8px;
    font-size:16px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.card h2{
    color:#0d6efd;
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:18px;
}

.result{
    margin-top:20px;
    text-align:center;
}

.result h3{
    color:#666;
}

.result h1{
    color:#198754;
    font-size:40px;
    margin-top:10px;
}

.footer{
    text-align:center;
    color:#777;
    margin-top:20px;
}
</style>

</head>
<body>

<div class="container">

<div class="header">
<h1>⛽ Al Mukhtar Petroleum</h1>
<p>Fuel Tank Dip Calculator</p>
</div>

<div class="card">

<h2>🛢️ 50-KL Tank</h2>

<label>Enter Dip (mm)</label>

<input
type="number"
placeholder="Enter Dip">

<div class="result">
<h3>Liters</h3>
<h1>0.00 L</h1>
</div>

</div>

<div class="card">

<h2>🛢️ 25-KL Tank</h2>

<label>Enter Dip (mm)</label>

<input
type="number"
placeholder="Enter Dip">

<div class="result">
<h3>Liters</h3>
<h1>0.00 L</h1>
</div>

</div>

<div class="footer">
© 2026 Al Mukhtar Petroleum
</div>

</div>

</body>
</html>
